<button mat-raised-button [color]="color()" [class]="sizeClass()" [disabled]="loading">
  @if (loading) {
    <app-progress-spinner size="md"></app-progress-spinner>
  } @else {
    @if (icon && iconPosition !== 'end') {
      <mat-icon>{{ icon }}</mat-icon>
    }

    @if (text) {
      <span>{{ text }}</span>
    }

    @if (icon && iconPosition === 'end') {
      <mat-icon>{{ icon }}</mat-icon>
    }
  }
</button>
