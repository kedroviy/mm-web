<div class="grid-container"
     [style.--sidebar-width]="config().isExpanded ? '2fr' : '1fr'"
     [style.--row-height]="config().rowHeight"
     [style.--gap]="config().gutter">

  @for (tile of config().tiles; track $index) {
    <div class="grid-tile"
         [style.grid-column]="'span ' + tile.cols"
         [style.grid-row]="'span ' + tile.rows"
         [style.background]="tile.color">

      @if (tile.component) {
        <!-- Используем явную передачу через inputs (Angular 16.2+) -->
        <ng-container *ngComponentOutlet="tile.component; inputs: tile.inputs" />
      } @else {
        {{ tile.text }}
      }

    </div>
  }
</div>
