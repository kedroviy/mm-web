<section class="hub-grid">
  @if (title()) {
    <h2 class="hub-title">{{ title() }}</h2>
  }
  <div class="hub-grid__container">
    @for (item of modules; track item.title) {
      <app-kit-card
        class="hub-grid__card"
        [title]="item.title"
        [description]="item.description"
        actionText="Открыть"
        [appearance]="'outlined'"
        (actionClick)="navigate(item.link)"
      />
    }
  </div>
</section>
